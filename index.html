<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スズダケ竹細工レシピ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #333;
      background: #faf8f5;
      line-height: 1.8;
    }
    header {
      background: #5c4a3a;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; letter-spacing: 0.1em; }
    header p { margin-top: 0.5rem; font-size: 0.95rem; opacity: 0.85; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    .intro {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-left: 4px solid #8b7355;
    }
    .recipe-list { list-style: none; }
    .recipe-list li {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .recipe-list li:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .recipe-list a {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #333;
      padding: 1rem;
    }
    .recipe-list .thumb {
      width: 80px;
      height: 80px;
      background: #e8e0d6;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-right: 1rem;
    }
    .recipe-list .info h2 { font-size: 1.1rem; }
    .recipe-list .info p { font-size: 0.85rem; color: #888; margin-top: 0.3rem; }
    footer {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>スズダケ竹細工レシピ</h1>
    <p>制作記録と作り方のまとめ</p>
  </header>

  <div class="container">
    <div class="intro">
      <p>スズダケを使った竹細工の制作手順・TIPSをまとめた個人メモです。</p>
    </div>

    <h2 style="margin-bottom:1rem; color:#5c4a3a;">レシピ一覧</h2>
    <ul class="recipe-list">
      <li>
        <a href="recipes/chikaradake/">
          <div class="thumb"><img src="recipes/chikaradake/images/IMG_4764.jpg" alt="" style="width:80px;height:80px;object-fit:cover;border-radius:6px;"></div>
          <div class="info">
            <h2>１尺ざる 力竹の入れ方</h2>
            <p>４つ割4本を十字に通す手順</p>
          </div>
        </a>
      </li>
    </ul>
  </div>

  <footer>
    &copy; 2026 スズダケ竹細工レシピ
  </footer>
</body>
</html>
